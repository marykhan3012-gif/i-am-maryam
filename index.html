<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryam Khan's Web App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
        }
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            animation: fadeIn 2s ease 1;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            flex-wrap: wrap;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            flex: 1 1 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Maryam Khan's Web App</h1>
        <p>A bold, impressive web experience.</p>
    </div>
    <div class="features">
        <div class="feature-card">
            <h2>Feature 1</h2>
            <p>Description of feature 1</p>
        </div>
        <div class="feature-card">
            <h2>Feature 2</h2>
            <p>Description of feature 2</p>
        </div>
        <div class="feature-card">
            <h2>Feature 3</h2>
            <p>Description of feature 3</p>
        </div>
    </div>
</body>
</html>
