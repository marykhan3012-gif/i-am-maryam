<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empowering Maryam Khan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #ff6f61, #ffccbc);
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 2em;
        }

        main {
            padding: 20px;
            text-align: center;
        }

        .mountain {
            background-image: url('path_to_your_mountain_image.jpg'); /* Add a suitable mountain image URL */
            height: 300px;
            background-size: cover;
            position: relative;
        }

        .empowering-message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            padding: 10px;
            font-size: 1.2em;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #ffccbc;
            color: #333;
            font-size: 1em;
        }
    </style>
</head>

<body>

    <header>
        🌟 Empowering Maryam Khan 🌟
    </header>

    <main>
        <div class="mountain">
            <div class="empowering-message">
                "Embrace your journey, create your path!" 💪✨
            </div>
        </div>
        <p>Welcome to my creative space! Here I share my journey as a female creator.</p>
    </main>

    <footer>
        © 2026 Maryam Khan – all rights reserved. 💖
    </footer>

</body>

</html>
